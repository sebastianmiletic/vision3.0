        <header class="hud-top">
            <div class="statline" id="userTelemetry">LOC: REQUESTING PERMISSION...</div>
            <div class="top-mini-menu" id="topMiniMenu">
                <div class="mini-preset-group" role="group" aria-label="Performance preset">
                    <button type="button" class="mini-preset-btn" data-performance-preset="quality">QUALITY</button>
                    <button type="button" class="mini-preset-btn" data-performance-preset="balanced">BALANCED</button>
                    <button type="button" class="mini-preset-btn active" data-performance-preset="performance">PERFORMANCE</button>
                </div>
                <button type="button" class="mini-menu-btn" id="profileSettingsBtn">SETTINGS</button>
                <button type="button" class="mini-menu-btn record-toggle-btn" id="sessionRecordBtn" aria-pressed="false" title="Start/stop recording" aria-label="Start recording">
                    <span class="record-icon" aria-hidden="true"></span>
                </button>
                <button type="button" class="mini-menu-btn recording-load-btn" id="recordingLoadBtn" title="Load saved recording">LOAD</button>
                <button type="button" class="mini-menu-btn afk-toggle-btn" id="afkModeBtn" aria-pressed="false" title="Open Vision Terminal">V</button>
                <button type="button" class="mini-menu-btn" id="aiDecisionBtn">AI</button>
                <button type="button" class="mini-menu-btn" id="apiGuideBtn">APIs</button>
            </div>
            <div class="brand-wrap">
                <h1>VISION V2.0</h1>
                <p>DELTA GLOBAL INTELLIGENCE</p>
                <span class="app-stamp">VISION v2.0</span>
            </div>
            <div class="top-link">⛓</div>
            <div class="style-wrap">
                <small>ACTIVE STYLE</small>
                <strong id="activeStyleLabel">NORMAL</strong>
            </div>
        </header>

        <div id="fullscreenHint" class="fullscreen-hint" aria-live="polite"></div>

        <section class="vision-terminal-panel hidden" id="visionTerminalPanel" aria-hidden="true">
            <iframe id="visionTerminalFrame" title="Vision Terminal" loading="lazy"></iframe>
        </section>

        <section class="recording-panel panel hidden" id="recordingPanel" aria-hidden="true">
            <div class="recording-main-row">
                <span class="recording-title">REPLAY</span>
                <button type="button" class="chip" id="recordingPlayPauseBtn">PLAY</button>
                <button type="button" class="chip" id="recordingRateBtn">1X</button>
                <button type="button" class="chip" id="recordingSaveBtn">SAVE</button>
                <button type="button" class="chip" id="recordingOpenBtn">OPEN</button>
                <span id="recordingCurrentTime">00:00</span>
                <input type="range" id="recordingTimeline" min="0" max="0" step="1" value="0">
                <span id="recordingTotalTime">00:00</span>
                <button type="button" class="tiny-btn" id="recordingCloseBtn">×</button>
            </div>
            <div class="recording-library hidden" id="recordingLibraryPanel" aria-hidden="true">
                <div class="recording-library-head">
                    <strong>SAVED RECORDINGS</strong>
                    <button type="button" class="chip recording-library-refresh-btn" id="recordingLibraryRefreshBtn">REFRESH</button>
                </div>
                <div class="recording-library-list" id="recordingLibraryList"></div>
            </div>
            <p class="recording-note" id="recordingNote">Ready.</p>
        </section>
